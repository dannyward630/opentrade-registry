version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "vitest"
          - "vite"
          - "@vitest/*"
          - "tsx"
          - "typescript"
      opentrade-workspace:
        patterns:
          - "@opentrade/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
