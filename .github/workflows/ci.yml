name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: corepack pnpm build

      - name: Registry and seed tests
        run: |
          corepack pnpm test:registry
          corepack pnpm registry:validate
          corepack pnpm db:seed:check
          corepack pnpm source:quality --json

      - name: Adapter contract tests
        run: corepack pnpm test:adapters

      - name: CLI smoke tests
        run: corepack pnpm test:cli

      - name: Hosted API and network guard tests
        run: corepack pnpm test:api

      - name: Verify
        run: corepack pnpm verify

      - name: Package dry-run
        run: corepack pnpm pack:check
