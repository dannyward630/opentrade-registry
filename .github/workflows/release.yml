name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed release tag
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OPENTRADE_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Check out signed tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify version and repository
        run: |
          corepack pnpm release:check-version
          corepack pnpm verify
          corepack pnpm security:audit
          corepack pnpm pack:check

      - name: Build release artifacts
        run: corepack pnpm release:pack

      - name: Publish core
        run: corepack pnpm --filter @opentrade-registry/core publish --access public --provenance --no-git-checks

      - name: Publish supported adapters and storage
        run: |
          corepack pnpm \
            --filter @opentrade-registry/adapter-az-roc \
            --filter @opentrade-registry/adapter-ca-cslb \
            --filter @opentrade-registry/adapter-fl-dbpr \
            --filter @opentrade-registry/adapter-mn-dli \
            --filter @opentrade-registry/adapter-or-ccb \
            --filter @opentrade-registry/adapter-tx-tdlr \
            --filter @opentrade-registry/adapter-wa-lni \
            --filter @opentrade-registry/storage-sqlite \
            publish --access public --provenance --no-git-checks

      - name: Publish orchestration and CLI
        run: |
          corepack pnpm --filter @opentrade-registry/registry publish --access public --provenance --no-git-checks
          corepack pnpm --filter @opentrade-registry/cli publish --access public --provenance --no-git-checks

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release create "$RELEASE_TAG" release-artifacts/* --verify-tag --generate-notes --title "OpenTrade Registry $RELEASE_TAG"
